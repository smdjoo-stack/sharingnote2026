<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>포스 소그룹 교재 아카이브</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="header glass-panel">
            <div class="header-content">
                <div class="logo-area">
                    <div class="logo-icon"><i class="ph-fill ph-books"></i></div>
                    <div class="logo-text">
                        <h1>포스모임 소그룹 나눔지</h1>
                        <p>아카이브</p>
                    </div>
                </div>
                <button class="icon-btn search-btn"><i class="ph ph-magnifying-glass"></i></button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Section: 포스모임 소개 -->
            <section class="intro-section">
                <div class="section-header">
                    <h2>포스모임 소개</h2>
                    <div class="section-line"></div>
                </div>
                <div class="intro-card glass-panel">
                    <p>포스(POS) 모임은 하나님의 말씀을 깊이 묵상하고 삶을 나누는 소그룹 공동체입니다.<br>이곳에서는 매주 나눈 교재와 자료들을 보관하고 복습할 수 있습니다.</p>
                </div>
            </section>

            <!-- Section: 소그룹 나눔지 -->
            <section class="archive-section">
                <div class="section-header">
                    <h2>소그룹 나눔지</h2>
                    <div class="section-line"></div>
                </div>
                <div id="archive-list" class="archive-list">
                    <!-- Cards injected here by JS -->
                    <div class="loading-skeleton"></div>
                    <div class="loading-skeleton"></div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer glass-panel">
            <p>© 2026 열방위에서는교회. All rights reserved.</p>
        </footer>
    </div>

    <script src="data/posts.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
